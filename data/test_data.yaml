# Data-Driven inputs (15%). Tests read scenarios from here - no hardcoding.
scenarios:
  - name: "shoes_under_220"
    query: "shoes"
    max_price: 220
    limit: 5
    budget_per_item: 400   # was 220 — variant price can exceed search-result price

  - name: "headphones_under_50"
    query: "headphones"
    max_price: 50
    limit: 3
    budget_per_item: 90   # was 50 — variant price can exceed search-result price
